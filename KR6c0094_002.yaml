body:
  text: 曲園居士俞樾注爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者何以故須菩提若菩薩有我相人相衆生相壽者相則非菩薩復舉上文以起下篇所以者何須菩提實無有法發阿耨多羅三藐三菩提心者無能生有有不能生無也須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不不也世尊如我解佛所説義佛於然燈佛所無有法得阿耨多羅三藐三菩提佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提塵盡則鏡明明固鏡之本體非有以助其明冰釋則水流流固水之本性非有以益其流須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛則不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼須菩提以實無所行而世尊名之為樂阿蘭那行如來以實無所得而然燈佛授記於來世作佛號釋迦牟尼如來與須菩提雖有差等其以無為法則一也何以故如來者即諸法如義諸法如義言一切法歸於各如其義也如來猶明鏡當前人之來者見為人物之來者見為物如其來者而已所謂如來也有少許塵埃即不能如來矣故一切妄念不可有也塵埃固不可有珠塵玉屑又豈可有哉有之亦不能如來矣故一切法亦不可有也若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無虗是故如來説一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法須菩提譬如人身長大須菩提言世尊如來説人身長大即為非大身是名大身上篇大身一喻以起下文此篇大身一喻以結上文德以大身之非大身明佛法之非佛法也右第一節此節所説即非法非非法之義説具前矣須菩提菩薩亦如是若作是言我當滅度無量衆生則不名菩薩何以故須菩提實無有法名為菩薩是故佛説一切法無我無人無衆生無壽者須菩提若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來説莊嚴佛土者即非莊嚴是名莊嚴言我當滅度衆生我當莊嚴佛土則有我矣故下云通達無我者真是菩薩也須菩提若菩薩通達無我法者如來説名真是菩薩右第二節承上文而言一切法即非一切法所以然者一切法皆生於我也有我則有人有我有人則有衆生壽者有如是一切即有如是一切法故必先之以無我誠能通達無我之法則不言一切法可也即言一切法亦可也經之大旨在於即住即降伏而降伏其心自無我始故於此特發明之下文又云知一切無我乃此經之要義也須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼此與下節皆承上文無我而言即有以明無也肉眼亦有天眼亦有慧眼亦有法眼亦有佛眼亦有然則如來無眼矣何以故止有肉眼則可名之曰肉眼止有佛眼則可名之曰佛眼自肉眼至佛眼無所不有則無可名矣凡經言一切諸相即是非相無非此義右第三節須菩提於意云何如恆河中所有沙佛説是沙不如是世尊如來説是沙須菩提於意云何如一恆河所有沙有如是沙等恆河是諸恆河所有沙數佛世界如是寧為多不甚多世尊佛告須菩提爾所國土中所有衆生若干種心如來悉知何以故如來説諸心皆為非心是名為心無論一切妄念即如上文所云我當滅度衆生我當莊嚴佛土皆非心也心固湛然無物也所以者何須菩提過去心不可得見在心不可得未來心不可得此亦即有以明無也過去見在未來三種心人人有之然求之此心究在何處則亦無也右第四節如來之五種眼也衆生之三種心也皆任舉以明無我之旨非義所重須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多須菩提若福德有實有實當作實有下文若浮塵衆實有者若世界實有者並作實有不作有實此亦當同也如來不説得福德多有則無矣以福德無故如來説得福德多無則有矣右第五節承上文通達無我法而言法尚應捨何論福德蓋既以無法為法則亦以無福德為福德也而愚僧妄為增益專以福德誘勸衆生失佛旨矣須菩提於意云何佛可以具足色身見不不也世尊如來不應以具足色身見何以故如來説具足色身即非具足色身是名具足色身如來所説色身非此色身是乃真具足色身也下文準此須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來説諸相具足即非具足是名諸相具足非身之身乃真身也非相之相乃真相也蓋外之身相皆幻形耳雖佛亦不能常有也知此中自有不壞者存則能離一切相而成佛矣竊嘗論之無此身無此相則非人也而此身此相則皆幻也孰為真者其吾之本性乎吾能保此性雖千百劫而不壞可也此佛之所以為佛也仙者變而言修鍊則欲常存此身常存此相矣而可得乎此仙之所以不如佛也右第六節佛既以無我示人又復説此者蓋無我之中又自有我此成佛之後所以無實無虗而在初發阿耨多羅三藐三菩提心者宜乎即住即降伏之以降伏為住然後無我而有我也此金剛經之大旨也須菩提汝勿謂如來作是念我當有所説法莫作是念何以故若人言如來有所説法則為謗佛不能解我所説故須菩提説法者無法可説上篇云無有定法如來可説此云無法可説其義更進蓋無定法猶有法也無法則并法亦無矣是名説法一言蔽之曰無是真説法也爾時慧命須菩提白佛言世尊頗有衆生於未來世聞説是法生信心不佛言須菩提彼非衆生非不衆生何以故須菩提衆生衆生者如來説非衆生是名衆生古本所無亦後人增益蓋以佛言無法可説恐人因此不信佛法故增益此文其意謂衆生則不信非衆生則自能信所以堅人之信與侈陳福德其意正同皆佛弟子護法之苦心也須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得無所失又何所得是名阿耨多羅三藐三菩提復次須菩提是法平等無有高下前言有差等者成就之次第也此言無高下者真體之本然也是名阿耨多羅三藐三菩提以無我無人無衆生無壽者修一切善法則得阿耨多羅三藐三菩提須菩提所言善法者如來説即非善法是名善法於阿耨多羅三藐三菩提無有少法可得此佛之所以為佛也修一切善法則得阿耨多羅三藐三菩提此衆生之所以為衆生也佛既自言無有少法可得矣然何以處衆生故又説此也夫一切法猶醫家之用藥也佛無病焉又何藥也其餘衆生各就其病而藥之於是有一切善法然此一切善法豈可以為常乎譬如有寒疾者以熱藥為善法若施之於熱疾即非善法矣故曰所言善法者即非善法是名善法法雖不可無法仍不可執故為上智説則無法可説為下愚説則無定法可説也須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人説於前福德百分不及一千萬億分乃至算數譬喻所不能及須菩提於意云何汝等勿謂如來作是念我當度衆生須菩提莫作是念何以故實無有衆生如來度者若有衆生如來度者如來則有我人衆生壽者須菩提如來説有我者即非有我而凡夫之人以為有我須菩提凡夫者如來説即非凡夫原其初聖亦凡也凡亦聖也聖凡且無一定而又何我之有須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來佛言須菩提若以三十二相觀如來者轉輪聖王則是如來須菩提白佛言世尊如我解佛所説義不應以三十二相觀如來此與上篇語同但上篇文略故無中間往復語耳世人見上篇須菩提已知不可以三十二相見如來疑其何以先悟而後迷因為之説曰前言不可以相見者色即是空也此言可以相觀者空即是色也若然則正合無實無虗之義宜蒙印可而反見駁詰何耶爾時世尊而説偈言若以色見我以音聲求我是人行邪道不能見如來右第七節此又以無法可説無法可得無衆生可度舉上文所有之義而申明之而仍以無相為歸宿其義皆具上篇而視上篇加詳焉學佛者所宜盡心也附録魏留支譯本云須菩提於意云何可以相成就得見如來不須菩提言如我解如來所説義不以相成就得見如來佛言如是如是須菩提不以相成就得見如來佛言須菩提若以相成就觀如來者轉輪聖王應是如來是故非以相成就得見如來爾時世尊而説偈言又唐義淨譯本云妙生於意云何應以具相觀如來不不爾世尊不應以具相觀於如來妙生若以具相觀如來者轉輪聖王應是如來是故不應以具相觀於如來應以諸相非相觀於如來爾時世尊而説頌曰按此文自留支以下各譯本皆與秦本不同蓋秦本之誤也余據秦本作注故云然以各本證之則余所見固與暗合矣因附録魏唐兩譯本以曉學者餘不備録須菩提汝若作是念如來不此字衍以具足相故得阿耨多羅三藐三菩提須菩提莫作是念謂如來以具足相故得阿耨多羅三藐三菩提是猶以三十二相觀如來也故戒之曰莫作是念文義本甚明因如來下衍一不字遂滋異説今不取也此下亦應有何以故三字與下文相準文不具耳如來不以具足相故得阿耨多羅三藐三菩提此就佛言也須菩提汝若作是念發阿耨多羅三藐三菩提心者説諸法斷滅莫作是念於阿耨多羅三藐三菩提無有少法可得者佛之所以為佛也修一切善法則得阿耨多羅三藐三菩提者衆生之所以為衆生也若衆生初發阿耨多羅三藐三菩提心而即説諸法斷滅則竟無可得矣故又戒之曰莫作是念何以故發阿耨多羅三藐三菩提心者於法不説斷滅相此就衆生言也右第八節承上文而以佛與衆生分別言之不執法相亦不廢法相誘掖衆生之義至矣須菩提若菩薩以滿恆河沙等世界七寶持用布施若復有人知一切法無我得成於忍忍即降伏之謂此菩薩勝前菩薩所得功德何以故須菩提以諸菩薩不受福德故須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故説不受福德右第九節因上文云莫説諸法斷滅恐人執有以為法故歸之於無我而極言無我之功德然功德非福德也恐人以福德為功德而有所貪著即非無我之義矣故又以不受福德申明之以是知諸言福德者失佛旨也須菩提若有人言如來若來若去若坐若臥是人不解我所説義何以故如來者無所從來無實亦無所去無虗故名如來須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆寧為多不須菩提言甚多世尊何以故若是微塵衆實有者佛則不説是微塵衆實則虗矣有則無矣所以者何佛説微塵衆即非微塵衆合之即為世界是名微塵衆散之即為微塵世尊如來所説三千大千世界即非世界散之即為微塵是名世界合之即為世界何以故若世界實有者則是一合相世界者微塵之積也若以為實有則非萬殊之虗體而有一合之實相矣如來説一合相即非一合相離之則為萬是名一合相合之則為一須菩提一合相者則是不可説離之則為萬合之則為一是此一合相者示無實無虗也而可説乎但凡夫之人貪著其事以不住為住即無此一合相矣右第十節此承上文不應貪著而言能不貪著則自得無實無虗之妙矣如來也世界也微塵衆也皆非實有者也何所著又何所貪乎須菩提若人言佛説我見人見衆生見壽者見須菩提於意云何是人解我所説義不不也世尊是人不解如來所説義何以故世尊説我見人見衆生見壽者見即非我見人見衆生見壽者見是名我見人見衆生見壽者見變相言見者自人觀之則為相以我自觀則為見也在菩薩則無我相人相衆生相壽者相已足為菩薩矣若佛則非特無此相乃至無此見非特無此見乃至無無此見何以故有我人衆壽之見固是有我見人見衆生見壽者見即自以為無我人衆壽之見亦是有我見人見衆生見壽者見蓋是者固是非者亦是也并此非者而無之乃真無之盡矣斯降伏之極功也故下文曰應如是知如是見如是信解蓋降伏之至而得所住也須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相須菩提所言法相者如來説即非法相是名法相他人所謂法相者法相也如來所謂法相者非法相也如來非特法相不生乃至非法之法非相之相而亦不生斯真不生法相矣須菩提若有人以滿無量阿僧祇世界七寶持用布施若有善男子善女人發菩提心者持於此經乃至四句偈等受持讀誦為人演説其福勝彼云何為人演説不取於相上言不生法相而此獨言不取於相者蓋有我則有人有我有人則有衆生壽者有如是一切則有如是一切法故此經以無我人衆壽始而以不取於相終不取於相而法不待言矣如如不動如是知如是見如是信解皆如也然有所如則有相矣如如非如也而亦非不如也此即無實無虗之妙旨也故下如字即住之謂也上如字即降伏之謂也即住而即降伏之乃真能住矣此所以不動也何以故一切有為法如夢幻泡影如露亦如電應作如是觀經之大旨在即住即降伏上云不取於相如如不動總結全經語簡而盡矣一切有為法四語又作偈語以結之經文之體例然也世以此四語為金剛經之精義夫稍解佛法者孰不知一空字乃以此四語為無上甚深乎耳食之論非真見也佛説是經已長老須菩提及諸比邱比邱尼優婆塞優婆夷一切世間天人阿修羅聞佛所説皆大歡喜信受奉行右第十一節總結上下篇也下篇之義皆具上篇或引申其未盡之旨或補益其未備之文往往詳略互見此佛弟子傳述之異疑在西土本自別行及傳入中土遂合而一之而以如是我聞發端信受奉行總結聯綴首尾不可復分今釐為上下篇庶讀者無疑其前後之復沓焉
