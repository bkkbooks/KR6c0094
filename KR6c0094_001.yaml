body:
  text: 曲園居士俞樾注如是我聞一時佛在舍衛國祇樹給孤獨園與大比邱衆千二百五十人俱爾時世尊食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐時長老須菩提在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言希有世尊如來善護念諸菩薩善付屬諸菩薩世尊善男子善女人發阿耨多羅三藐三菩提心應云何住如何能定云何降伏其心如何能空佛言善哉善哉須菩提如汝所説如來善護念諸菩薩善付屬諸菩薩汝今諦聽當為汝説善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心唯然世尊願樂欲聞右第一節須菩提問應云何住云何降伏其心此心即上文所謂阿耨多羅三藐三菩提心也住者住此心降伏者降伏此心非有二心也能住則能有矣能降伏則能無矣此一經之大旨也俗解謂安住真心降伏妄心分而二之全失其旨佛告須菩提諸菩薩摩訶薩應如是降伏其心不言住省文也所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想非無想我皆令入無餘涅槃而滅度之如是滅度無量無數無邊衆生此即所謂應如是住實無衆生得滅度者此即所謂應如是降伏何以故須菩提若菩薩有我相人相衆生相壽者相則非菩薩右第二節舊解謂此節佛先告須菩提以應如是降伏非也下篇云爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者云云正復舉此文而住與降伏並不分別言之然則此文亦必不分別言之矣經言應如是降伏其心不言應如是住蓋文不具耳此所據者鳩摩羅什本其餘各本文字不同上文問語魏留支本陳真諦大唐元奘本唐義淨本並有云何修行四字故説者以住修降伏為三義而願樂欲聞之下佛不再復舉上文可知佛言發明大義初不一一分別羅什本乃有應如是降伏其心一語轉使佛言有所偏著矣今姑以為省文實則此七字乃衍文耳以下篇證之可知其無以各本證之亦可知其無也所以然者即住即降伏本無二侯又何從分別言之乎其即住即降伏之法不外無我而已故曰通達無我法者真是菩薩也有我則有人有我有人則有好醜故以我人衆壽該之衆生相壽者相猶言醜相好相耳滅度衆生非義所重借以為言如孔子言志曰老者安之朋友信之少者懷之亦是借以為言也蓋心本空虗因事而見故此言滅度下言布施其義一也若卵生若胎生以下止是廣陳衆生見其無量無數無邊初無深義而解者乃謂胎卵濕化皆以喻心也支辭曲説求深而反淺矣復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施須菩提菩薩應如是布施不住於相何以故若菩薩不住相布施其福德不可思量須菩提於意云何東方虗空可思量不不也世尊須菩提南西北方四維上下虗空可思量不不也世尊須菩提菩薩無住相布施福德亦復如是不可思量須菩提菩薩但應如所教住右第三節須菩提問應云何住而佛告以應無所住者若心有住則為非住故以不住為住即住即降伏也上文以滅度言既明菩薩之無我人衆壽諸相矣此又以布施言而緒之曰不住於相不住於相是以無相也皆佛告須菩提以即住即降伏之旨也故曰菩薩但應如所教住苟不如所教住則為凡夫之貪著矣舊解以上節為佛告須菩提以應如是降伏此節為佛告須菩提以應如是住佛果分別言之則應順其問之次序何以先降伏而後住乎須菩提於意云何可以身相見如來不不也世尊不可以身相得見如來何以故如來所説身相即非身相色即空也佛告須菩提凡所有相皆是虗妄若見諸相非相即見如來須菩提白佛言世尊頗有衆生得聞如是言説章句生實信不佛告須菩提莫作是説如來滅後後五百歲有持戒修福者於此章句能生信心以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者須菩提如來悉知悉見是諸衆生得如是無量福德何以故是諸衆生四字衍無復我相人相衆生相壽者相無法相亦無非法相即上所云諸相非相也何以故是諸衆生四字衍若心取相則為著我人衆生壽者凡所有相皆從心生若取法相即著我人衆生壽者執有固有也何以故三字衍若取非法相即著我人衆生壽者執無亦有也是故不應取法不應取非法以是義故如來常説汝等比邱知我説法如筏喻者法尚應捨何況非法右第四節此因不住於相而極言之至於法相非法相皆不可有乃至法亦不可有故以法尚應捨終焉法者應如是住也捨者應如是降伏也須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所説法耶須菩提言如我解佛所説義無有定法名阿耨多羅三藐三菩提亦無有定如來可説住則定矣即住即降伏故無定何以故如來所説法皆不可取以無有定法故不可説以無所得故非法無實非非法無虗所以者何一切賢聖皆以無為法而有差別一切賢聖包下文須陀洹以上而言自初果須陀洹以至於成佛同一以無為法而有區別下文具陳之須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不須菩提言甚多世尊何以故是福德即非福德性是故如來説福德多若復有人於此經中受持乃至四句偈等為他人説其德勝彼何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出須菩提所謂佛法者即非佛法須陀洹以至於佛皆是佛法皆非佛法佛言此以啓發須菩提而起下文也須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊何以故須陀洹名為入流須陀洹應如是住而無所入不入色聲香味觸法須陀洹應如是降伏是名須陀洹所謂須陀洹法即非須陀洹法下文斯陀含也阿那含也均依此説之不具説也須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含須菩提於意云何那阿含能作是念我得阿那含果不須菩提言不也世尊何以故阿那含名為不來而實無不來是名阿那含須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也世尊何以故實無有法名阿羅漢與上文互相備實無有法名阿羅漢則亦實我有法名須陀洹斯陀含阿那含也世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者阿那含以下亦然世尊佛説我得無諍三昧人中最為第一是第一離欲阿羅漢我不作是念我是離欲阿羅漢世尊我若作是念我得阿羅漢道世尊則不説須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行此須菩提自明以無為法之義也佛告須菩提於意云何如來昔在然燈佛所於法有所得不不也世尊如來在然燈佛所於法實無所得此又佛自以意啓發須菩提明以無為法之義蓋自須陀洹至於佛雖有差別而同一以無為法也須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴苟知不莊嚴之為莊嚴乃真莊嚴矣言此以起下文清淨之意是故須菩提諸菩薩摩訶薩應如是生清淨心清淨者無之盡也不應住色生心不應住聲香味觸法生心應無所住而生其心無則有矣右第五節此承上文法尚應捨而進言之見非獨應捨且亦無法自須陀洹以至成佛皆是佛法皆非佛法蓋同一以無為法也無之至則清淨矣清淨之至則湛然無物而天下之理皆從此出是謂無所住而生其心苟有所住即不能生其心矣故即住而即降伏之要在於無所住而生其心然後可以成佛然後可以滅度一切衆生佛告須菩提之大旨略盡於此矣須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大世尊何以故佛説非身是名大身泥乎身而言則雖瞞巨無霸不足為大也身如須彌山王則非身矣故名大身也此設喻以起下之無深義須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不須菩提言甚多世尊但諸恆河尚多無數何況其沙須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不須菩提言甚多世尊佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人説而此福德勝前福德復次須菩提隨説是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法若是經典所在之處則為有佛若尊重弟子爾時須菩提白佛言世尊當何名此經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持所以者何佛説般若波羅蜜即非般若波羅蜜非法是法亦猶非身是身也自此以下皆申明佛法之非佛法須菩提於意云何如來有所説法不須菩提白佛言世尊如來無所説以離乎法為法則不得泥乎法以為説也須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊須菩提諸微塵如來説非微塵是名微塵如來説世界非世界是名世界微塵至小也世界至大也然執小以為小不足為小也執大以為大不足為小也執大以為大不足為大也然則微塵非小世界乃小耳是故非微塵名微塵世界非大微塵乃大耳是故非世界名世界須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來何以故如來説三十二相即是非相色即是空是名三十二相空即是色須菩提若有善男子善女人以恆河沙等身命布施若復有人於此經中乃至受持四句偈等為他人説其福甚多爾時須菩提聞説是經深解義趣涕淚悲泣而白佛言希有世尊佛説如是甚深經典我從昔來所得慧眼未曾得聞如是之經世尊若復有人得聞是經信心清淨則生實相信心清淨空也則生實相者空即是色也當知是人成就第一希有功德世尊是實相者即是非相是故如來説名實相虗靈不昧之本體非幻相也世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有衆生得聞是經信解受持是人則為第一希有何以故此人二字衍無我相人相衆生相壽者相所以者何我相即是非相人相衆生相壽者相即是非相何以故離一切諸相則名諸佛世界也微塵也以至佛之三十二相皆未離乎相者也皆非實相也自大身一喻之後皆發明此意而以離一切相為歸宿佛告須菩提如是如是若復有人得聞是經不驚不怖不畏當知是人甚為希有何以故如來説第一波羅蜜即非第一波羅蜜非法是名第一波羅蜜非非法須菩提忍辱波羅蜜如來説非忍辱波羅蜜因第一波羅蜜無可説故以忍辱波羅蜜言之以淺見深何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相何以故我於往昔節節支解時若有我相人相衆生相壽者相應生嗔恨須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相就忍辱波羅蜜證以此二事明離相之功是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心不應住色生心不應住聲香味觸法生心應生無所住心上言應無所住而生其心由住而生也此言應生無所住心住即是生矣右第六節前因不住於相而極言之至於以無為法所謂佛法皆非佛法此又因佛法非法而極言之至於離一切相仍歸之於不住於相回環相生總見法相皆空乃降伏之極功也若心有住則為非住佛以不住為住故即住即降伏也自此以下皆約舉前文以總詰上篇是故佛説菩薩心不應住色生心不言聲香味觸法者省文也俗解以為舉重而言非也須菩提菩薩為利益一切衆生應如是布施如來説一切諸相即是非相色非色又説一切衆生即非衆生形非形須菩提如來是真語者實語者如語者不誑語者不異語者如語即真語實語亦即不誑語不異語如其真如其實故不誑不異也佛以此告須菩提明其言之可信而真語實語不誑不異無非如語而已矣如其義而語有語亦無語也須菩提如來所得法此法無實無虗無實者非法也無虗者非非法也上言如來於法無所得明無實也此言如來所得法明無虗也無實者降伏之功無虗者住之效惟如來於法無所得故為如來所得法蓋不住固不足以言降伏而不降伏亦不足以住也故曰佛説般若波羅蜜即非般若波羅蜜即住即降伏是為非法非非法即為無實無虗金剛經大旨盡此矣須菩提若菩薩心住於法而行布施如人入暗則無所見若菩薩心不住法而行布施如人有目日光明照見種種色反覆申明之上篇止此右第七節須菩提當來之世若有善男子善女人能於此經受持讀誦則為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解説須菩提以要言之是經有不可思議不可稱量無邊功德如來為發大乘者説為發最上乘者説若有人能受持讀誦廣為人説如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等則為荷擔如來阿耨多羅三藐三菩提何以故須菩提若樂小法者著我見人見衆生見壽者見則於此經不能聽受讀誦為人解説須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處則為是塔皆應恭敬作禮圍繞以諸華香而散其處復次須菩提善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提須菩提我念過去無量阿僧祇劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具説者或有人聞心則狂亂狐疑不信須菩提當知是經義不可思議果報亦不可思議
