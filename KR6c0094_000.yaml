body:
  text: 金剛般若波羅蜜經注序自五祖始勸僧俗誦金剛經謂但誦此經可以見性成佛而金剛經遂為世之所重余嘗三復是經竊謂經之大旨在佛告須菩提應如是住如是降伏其心住者住此心降伏者降伏此心皆即所謂阿耨多羅三藐三菩提心非有二心也住則實矣降伏則虗矣即住即降伏是以無實無虗此金剛經之大旨也以儒理譬之子貢問有一言而可以終身行之者乎子曰其恕乎己所不欲勿施於人所謂應如是住也子貢曰我不欲人之加諸我也我亦欲無加諸人子曰賜也非爾所及也所謂應如是降伏也子曰衣敝縕袍與衣狐貉者立而不恥者其由也與不忮不求何用不臧所謂應如是住也子路終身誦之子曰是道也何足以臧所謂應如是降伏也不住固無所謂降伏而不降伏又焉能住經中即非是名句凡數見即非者降伏之謂是名者住之謂而世俗解是經者則謂安住其真心降伏其妄心分而二之於全經之義俱失乃明洪武間僧宗泐奉詔注經亦如此説然則經義之晦久矣是經推論即住即降伏之旨至於無法可得無法可説真無上甚深之妙義也而佛弟子懼其流傳中土使人輕蔑佛法遂於其中妄有增益輒謂受持讀誦此經有無量無邊福德雖亦護法之苦心然使經文隔絶意義不明則亦不得為無罪如云一切賢聖皆以無為法而有差別此為下文須陀洹諸文發端自須陀洹以至如來即所謂一切賢聖也而中間忽入七寶布施之文則文義隔絶矣此後人附益之證一也又如佛説非身是名大身此是譬喻之詞下文佛説般若波羅蜜即非般若波羅蜜乃正意也而中間又入七寶布施之文則文義隔絶矣此後人附益之證二也至如佛説經已申以贊歎之言如楞嚴經末云若有衆生能誦此經能持此呪直成菩提無復魔業固亦體例所有乃此經則處處及之經文未半佛旨未宣須菩提輒問衆生信不世尊輒侈陳是經福德抑何急遽乃爾此後人附益之證三也經文既訖自表經名如巨力長者經末云阿難白佛言此經當以何名我等云何受持佛告阿難此經名曰巨力長者所問大乘經是亦體例所有乃此經則於所謂第十三分中而即出之未説經文先説經名須菩提之問世尊之答皆失敘矣此後人附益之證四也又屢屢言及四句偈不知何指或以為若以色見我四句或以為一切有為法四句然其文皆在後是佛説四句偈時未有此四句偈也須菩提能不問此四句云何乎嘗讀楞伽經知所謂四句偈者離一異俱不俱有無非有非無常無常與金剛經之旨頗合而實非金剛經所有之文疑佛平時常以此四句與金剛經並授諸弟子後人遂牽連而及之此後人附益之證五也有是五證知金剛經實有後人附益之語以莠亂苗厥旨愈晦又是經本不分章今釐為三十二分云是梁昭明太子所定未知然不以意分并妄設名目實非善本未足信從余以章句陋儒桑榆暮景窮而學佛於西來大義固無所聞而於此經竊有獨得之見不揣固陋為之注釋分為上下二篇上篇七節下篇十一節共十有八節其附益之語相沿既久且亦自西土傳來未敢芟剃輒下一格書之學者欲誦習全文全文具在若欲推尋旨趣則刊落繁蕪真經自見雖似前後復沓實則脈絡分明五祖所謂但誦此經可以見性成佛者亦可得其大概矣光緒九年十月曲園居士俞樾書於吳江舟中
